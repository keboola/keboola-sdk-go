version: '3'

tasks:
  tools:
    cmds:
      - bash ./scripts/tools.sh

  lint:
    cmds:
      - bash ./scripts/lint.sh

  fix:
    cmds:
      - bash ./scripts/fix.sh

  tests:
    cmds:
      - go tool gotestsum --no-color=false --format testname -- -timeout 600s -p 8 -parallel 8 -v -race -coverprofile=/tmp/profile.out ./pkg/...

  upload-tests:
    cmds:
      - cd upload && go tool gotestsum --no-color=false --format testname -- -timeout 600s -p 8 -parallel 8 -v -race ./...

  godoc:
    cmds:
      - go tool godoc -http=0.0.0.0:6060

  upload-lint:
    cmds:
      - (cd upload && golangci-lint run -c "../build/ci/golangci.yml")

  upload-fix:
    cmds:
      - (cd upload && golangci-lint run --fix -c "../build/ci/golangci.yml")

  update-deps:
    desc: Tidy go.mod for each module and sync the workspace
    cmds:
      - GOWORK=off go mod tidy
      - GOWORK=off go mod vendor
      - cd upload && GOWORK=off go mod tidy
      - go work sync

  update:
    cmds:
      - go tool go-mod-upgrade
      - go mod tidy
      - go mod vendor
